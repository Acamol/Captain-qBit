version: 2
updates:
  # Main Gradle build — app + library modules, versions in gradle/libs.versions.toml.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch routine minor/patch bumps into a single PR; major bumps still get
      # their own PR so breaking upgrades are reviewed individually.
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Convention plugins in the included build (build-logic/).
  - package-ecosystem: "gradle"
    directory: "/build-logic"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      build-logic-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
