name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > qbit-release.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storeFile=qbit-release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to a clean asset name
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/*.apk "Captain-qBit-${version}.apk"

      - name: Build release notes from tag message
        id: notes
        run: |
          # checkout leaves a lightweight tag on the runner; re-fetch the annotated tag
          # so its message (not the commit message) is used as the release notes.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          {
            echo 'body<<__NOTES_EOF__'
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME"
            echo '__NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Captain-qBit-*.apk
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true
