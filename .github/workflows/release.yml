name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > qbit-release.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          {
            echo "storeFile=qbit-release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to a clean asset name
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/*.apk "Captain-qBit-${version}.apk"

      - name: Build release notes from the fastlane changelog
        id: notes
        run: |
          # Single-source the changelog from fastlane (the same file F-Droid uses), formatted
          # like previous releases: "Captain qBit X.Y.Z" + blank line + the changelog bullets.
          # Fail the release if the changelog for this versionCode is missing.
          version="${GITHUB_REF_NAME#v}"
          version_code="$(grep -oE 'versionCode[[:space:]]*=[[:space:]]*[0-9]+' app/build.gradle.kts | grep -oE '[0-9]+' | head -1)"
          changelog="fastlane/metadata/android/en-US/changelogs/${version_code}.txt"
          if [ ! -f "$changelog" ]; then
            echo "::error::Changelog $changelog not found for versionCode $version_code"
            exit 1
          fi
          # F-Droid truncates the "What's New" text at 500 characters, so a longer
          # changelog shows cut off for every user. Fail the release before publishing.
          max_chars=500
          char_count="$(wc -m < "$changelog" | tr -d '[:space:]')"
          if [ "$char_count" -gt "$max_chars" ]; then
            echo "::error::Changelog $changelog is $char_count characters; F-Droid truncates the \"What's New\" text at $max_chars. Trim it."
            exit 1
          fi
          {
            echo 'body<<__NOTES_EOF__'
            echo "Captain qBit ${version}"
            echo
            cat "$changelog"
            echo '__NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: Captain-qBit-*.apk
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true
